# golangci-lint
run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude-use-default: false
  exclude-rules:
    # Defer Close/Restore on network and stdio helpers; errors are rarely actionable.
    - linters: [errcheck]
      text: "Error return value of .*\\.Close is not checked"
    - linters: [errcheck]
      text: "Error return value of `term.Restore` is not checked"
    - linters: [errcheck]
      text: "Error return value of `fmt.Fprint"
